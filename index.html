<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>安心看診</title>
<style>
  :root {
    --teal: #00BFA5;
    --teal-light: #E0F7F3;
    --teal-dark: #009688;
    --teal-50: #E0F2F1;
    --bg: #F5F5F5;
    --card-bg: #FFFFFF;
    --text-primary: #333333;
    --text-secondary: #666666;
    --text-light: #999999;
    --border: #EEEEEE;
    --orange-dark: #E65100;
    --orange-light: #FFF3E0;
    --blue-light: #E3F2FD;
    --purple-light: #F3E5F5;
    --warm-yellow: #FFF9C4;
    --shadow: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 12px;
    --radius-xs: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--text-primary);
    max-width: 430px; margin: 0 auto;
    min-height: 100vh; padding-bottom: 40px;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(135deg, var(--teal) 0%, #26A69A 100%);
    padding: 20px 20px 18px;
    border-radius: 0 0 24px 24px;
    box-shadow: 0 4px 20px rgba(0,150,136,0.2);
  }
  .header-greeting { font-size: 14px; color: rgba(255,255,255,0.85); margin-bottom: 2px; }
  .header-title { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .search-wrap { position: relative; }
  .search-input {
    width: 100%; padding: 13px 16px 13px 44px;
    border: none; border-radius: var(--radius-sm);
    font-size: 15px; background: rgba(255,255,255,0.95);
    outline: none; color: var(--text-primary);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .search-input::placeholder { color: var(--text-light); }
  .search-input:focus { background: #fff; }
  .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--teal); }
  .search-clear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: #ccc; color: #fff; border: none; border-radius: 50%;
    width: 22px; height: 22px; font-size: 12px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
  }
  .search-clear.show { display: flex; }

  /* SECTION */
  .section-title { padding: 20px 20px 6px; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .section-sub { padding: 0 20px 12px; font-size: 13px; color: var(--text-light); }

  /* CAROUSEL */
  .carousel-wrap { padding: 0 0 0 20px; }
  .carousel {
    display: flex; gap: 12px;
    overflow-x: auto; scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding-right: 20px; padding-bottom: 4px;
  }
  .carousel::-webkit-scrollbar { display: none; }

  .hot-card {
    flex: 0 0 260px; scroll-snap-align: start;
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    overflow: hidden; border: 2px solid transparent;
  }
  .hot-card:active { transform: scale(0.97); }
  .hot-card.selected { border-color: var(--teal); box-shadow: 0 4px 20px rgba(0,191,165,0.2); }

  .hot-card-top {
    padding: 14px 14px 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .hot-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .hot-name { font-size: 14px; font-weight: 700; }
  .hot-dept { font-size: 11px; color: var(--text-light); margin-top: 1px; }

  .hot-questions { padding: 0 14px 12px; }
  .hot-q {
    font-size: 12.5px; color: var(--teal-dark); line-height: 1.5;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    display: flex; gap: 6px;
  }
  .hot-q:last-child { border-bottom: none; }
  .hot-q-bullet { color: var(--teal); flex-shrink: 0; font-weight: 700; }

  /* Dots */
  .carousel-dots { display: flex; justify-content: center; gap: 6px; padding: 12px 0 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #D0D0D0; transition: all 0.2s; }
  .dot.active { width: 18px; border-radius: 3px; background: var(--teal); }

  /* EXPANDED DETAIL (below carousel) */
  .expand-panel {
    margin: 12px 20px 0;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    display: none;
    animation: slideDown 0.25s ease;
  }
  .expand-panel.show { display: block; }
  @keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }

  .expand-header {
    padding: 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .expand-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .expand-title { font-size: 16px; font-weight: 800; flex: 1; }
  .expand-close {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg); border: none; font-size: 16px;
    color: var(--text-light); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .expand-body { padding: 16px; }

  /* Dept tags */
  .dept-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .dtag { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .dtag.dept { background: var(--blue-light); color: #1565C0; }
  .dtag.alt { background: var(--purple-light); color: #7B1FA2; }

  /* Treatment cards — THE STAR */
  .treat-section-title {
    font-size: 13px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 5px;
  }
  .treat-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .treat-card {
    border-radius: var(--radius-sm);
    padding: 14px;
    position: relative;
  }
  .treat-card.opt-a { background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%); }
  .treat-card.opt-b { background: linear-gradient(135deg, #F3E5F5 0%, #E1BEE7 100%); }
  .treat-card.opt-c { background: linear-gradient(135deg, #FFF3E0 0%, #FFE0B2 100%); }
  .treat-card.opt-d { background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%); }

  .treat-name {
    font-size: 14px; font-weight: 800;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .treat-name .label-chip {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 6px;
    background: rgba(255,255,255,0.7);
  }
  .treat-detail { display: flex; gap: 10px; }
  .treat-col { flex: 1; font-size: 12px; line-height: 1.6; }
  .treat-col.pro { color: #1B5E20; }
  .treat-col.con { color: #B71C1C; }
  .treat-col-title { font-size: 11px; font-weight: 700; margin-bottom: 3px; opacity: 0.7; }

  /* Alternative therapy */
  .alt-section {
    padding: 10px 14px;
    background: var(--teal-light);
    border-radius: var(--radius-xs);
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--teal-dark);
    line-height: 1.6;
  }
  .alt-section strong { font-size: 12px; }

  /* Q&A — compact */
  .qa-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; cursor: pointer;
    border-top: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
  }
  .qa-toggle-arrow { font-size: 12px; transition: transform 0.2s; color: var(--text-light); }
  .qa-toggle.open .qa-toggle-arrow { transform: rotate(90deg); }
  .qa-list { display: none; padding-bottom: 4px; }
  .qa-list.open { display: block; }

  .qa-item {
    border: 1.5px dashed var(--teal);
    border-radius: var(--radius-xs);
    padding: 12px 12px 10px;
    margin-bottom: 8px;
    background: #FAFFFE;
    position: relative;
  }
  .qa-num {
    position: absolute; top: -8px; left: 10px;
    background: var(--teal); color: #fff;
    width: 20px; height: 20px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
  }
  .qa-text {
    font-size: 13px; font-weight: 600; color: var(--teal-dark);
    line-height: 1.6; margin-bottom: 6px; padding-top: 2px;
  }
  .qa-purpose {
    font-size: 11.5px; color: var(--text-secondary);
    line-height: 1.5; padding: 6px 8px;
    background: var(--teal-light); border-radius: 6px;
  }
  .qa-purpose strong { color: var(--orange-dark); }

  /* PDA link */
  .pda-link {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--teal); font-size: 13px; font-weight: 600;
    text-decoration: none; padding: 8px 14px;
    background: var(--teal-light); border-radius: 10px;
    margin-top: 4px;
  }

  /* SEARCH RESULTS */
  .search-results { display: none; padding: 0 20px; }
  .search-results.show { display: block; }
  .sr-header { font-size: 13px; color: var(--text-light); padding: 16px 0 10px; }
  .sr-card {
    background: var(--card-bg); border-radius: var(--radius-sm);
    box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden;
  }
  .sr-link {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; text-decoration: none; color: var(--text-primary);
  }
  .sr-badge {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .sr-info { flex: 1; }
  .sr-title { font-size: 13.5px; font-weight: 600; line-height: 1.5; }
  .sr-cat { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .sr-arrow { color: var(--teal); font-size: 14px; flex-shrink: 0; }

  /* Empty */
  .empty-state { text-align: center; padding: 50px 20px; display: none; }
  .empty-state.show { display: block; }
  .empty-icon { font-size: 48px; margin-bottom: 10px; }
  .empty-text { font-size: 15px; color: var(--text-secondary); }
  .empty-hint { font-size: 13px; color: var(--text-light); margin-top: 4px; }

  .landing { display: block; }
  .landing.hide { display: none; }

  .disclaimer {
    margin: 20px 20px 0; padding: 12px 14px;
    background: var(--warm-yellow); border-radius: var(--radius-sm);
    font-size: 11.5px; color: #F57F17; line-height: 1.6;
  }

  mark { background: #FFEB3B; color: inherit; padding: 0 1px; border-radius: 2px; }

  .scroll-top {
    position: fixed; bottom: 24px; right: 16px;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--teal); color: #fff; border: none;
    box-shadow: var(--shadow-md); font-size: 18px; cursor: pointer;
    display: none; align-items: center; justify-content: center; z-index: 99;
  }
  .scroll-top.show { display: flex; }

  /* CATEGORY QUICK FILTERS */
  .cat-filter-wrap { padding: 16px 20px 0; }
  .cat-filter-label { font-size: 13px; color: var(--text-light); margin-bottom: 8px; }
  .cat-filters {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .cat-btn {
    padding: 6px 14px; border-radius: 20px;
    font-size: 12.5px; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--card-bg);
    color: var(--text-secondary); cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .cat-btn:active { transform: scale(0.95); }
  .cat-btn.active { background: var(--teal); color: #fff; border-color: var(--teal); }

  /* HOT SEARCH TAGS */
  .hot-tags-wrap { padding: 16px 20px 4px; }
  .hot-tags-label { font-size: 13px; color: var(--text-light); margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
  .hot-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .hot-tag {
    padding: 5px 12px; border-radius: 14px;
    font-size: 12px; color: var(--teal-dark);
    background: var(--teal-light); cursor: pointer;
    transition: all 0.15s; border: none;
  }
  .hot-tag:active { transform: scale(0.95); background: var(--teal); color: #fff; }

  /* QA SECTION REDESIGN — always visible */
  .qa-section-header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 0 10px;
    border-top: 2px solid var(--teal);
    margin-top: 14px;
  }
  .qa-section-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--teal); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .qa-section-title {
    font-size: 14px; font-weight: 800; color: var(--teal-dark);
  }
  .qa-section-sub {
    font-size: 11px; color: var(--text-light); font-weight: 400;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-greeting">看診前，先來這裡逛逛</div>
  <div class="header-title"><span style="font-size:26px">🩺</span> 安心看診</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="搜尋：膝蓋痛、糖尿病、白內障...">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="landing" id="landing">
  <!-- Hot search tags -->
  <div class="hot-tags-wrap">
    <div class="hot-tags-label">🔍 快速查詢</div>
    <div class="hot-tags" id="hotTags">
      <button class="hot-tag" onclick="quickSearch('膝蓋痛')">膝蓋痛</button>
      <button class="hot-tag" onclick="quickSearch('糖尿病')">糖尿病</button>
      <button class="hot-tag" onclick="quickSearch('高血壓')">高血壓</button>
      <button class="hot-tag" onclick="quickSearch('失眠')">失眠</button>
      <button class="hot-tag" onclick="quickSearch('感冒')">感冒</button>
      <button class="hot-tag" onclick="quickSearch('膽固醇')">膽固醇</button>
      <button class="hot-tag" onclick="quickSearch('白內障')">白內障</button>
      <button class="hot-tag" onclick="quickSearch('濕疹')">濕疹</button>
      <button class="hot-tag" onclick="quickSearch('癌症')">癌症</button>
      <button class="hot-tag" onclick="quickSearch('胃食道逆流')">胃食道逆流</button>
    </div>
  </div>

  <!-- Category quick filters -->
  <div class="cat-filter-wrap">
    <div class="cat-filter-label">📂 依科別瀏覽</div>
    <div class="cat-filters" id="catFilters">
      <button class="cat-btn active" onclick="filterCat('all',this)">全部</button>
      <button class="cat-btn" onclick="filterCat('心臟',this)">❤️ 心臟</button>
      <button class="cat-btn" onclick="filterCat('骨科',this)">🦴 骨科</button>
      <button class="cat-btn" onclick="filterCat('糖尿病',this)">💉 糖尿病</button>
      <button class="cat-btn" onclick="filterCat('癌症',this)">🎗️ 癌症</button>
      <button class="cat-btn" onclick="filterCat('腎臟',this)">🫘 腎臟</button>
      <button class="cat-btn" onclick="filterCat('眼科',this)">👁️ 眼科</button>
      <button class="cat-btn" onclick="filterCat('精神',this)">🧠 精神</button>
      <button class="cat-btn" onclick="filterCat('婦產',this)">🤰 婦產</button>
      <button class="cat-btn" onclick="filterCat('皮膚',this)">🧴 皮膚</button>
      <button class="cat-btn" onclick="filterCat('腸胃',this)">🔥 腸胃</button>
    </div>
  </div>

  <div class="section-title">🔥 大家都在問</div>
  <div class="section-sub">左右滑動，點卡片看詳細治療比較與問診小抄 👉</div>

  <div class="carousel-wrap">
    <div class="carousel" id="carousel"></div>
  </div>
  <div class="carousel-dots" id="carouselDots"></div>

  <!-- Expand panel appears here -->
  <div class="expand-panel" id="expandPanel"></div>

  <div class="disclaimer">
    📋 資料來源：臺北市立聯合醫院 SDM 平台、衛福部 SDM 國家平台、國健署、各醫學中心衛教資料<br>
    本指南僅供就醫參考，不構成臨床診斷。實際醫療決定請與主治醫師討論。
  </div>
</div>

<div class="search-results" id="searchResults"></div>
<div class="empty-state" id="emptyState">
  <div class="empty-icon">🤔</div>
  <div class="empty-text">沒有找到相關內容</div>
  <div class="empty-hint">換個關鍵字試試，例如「糖尿病」「膝蓋」</div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const optColors = ['opt-a','opt-b','opt-c','opt-d'];

const topics = [
  {
    name: "膝蓋痛到底要不要開刀？",
    icon: "🦴", iconBg: "#E8EAF6",
    dept: "骨科 · 復健科 · 疼痛科",
    hotQs: ["膝蓋退化一定要換關節嗎？","半人工和全人工差在哪？","不開刀還有什麼辦法？"],
    link: "https://sdm.tpech.gov.tw/xcsdm/cont?xsmsid=0I344395713692901115&sid=0I347059491664881609",
    depts: ["骨科","復健科","疼痛科","中醫科"],
    treatments: [
      { name: "全人工膝關節置換", risk: "med",
        pro: "一次解決所有退化面，10年再手術率僅 7%，健保給付", con: "傷口大(10-12cm)，復原約6天，可能需輸血，彎曲度約120°" },
      { name: "半人工膝關節置換", risk: "med",
        pro: "保留骨頭韌帶，復原快約4天，傷口小(6-8cm)，彎曲度130°", con: "10年再手術率 14%，不適合嚴重變形，自付差額略高" },
      { name: "保守治療（不開刀）", risk: "low",
        pro: "無手術風險，可隨時開始", con: "無法逆轉退化，嚴重疼痛時效果有限" }
    ],
    alts: "冷/熱敷、減重、玻尿酸注射、關節內類固醇注射、針灸、葡萄糖胺、消炎藥、鞋墊",
    questions: [
      { text: "「醫師，我膝蓋退化到什麼程度了？只有內側還是整個都壞了？這會影響手術方式嗎？」", why: "確認退化範圍，了解自己是否適合半人工（只適用內側退化）。" },
      { text: "「如果現在不開刀，還有什麼止痛或延緩退化的方法？打玻尿酸或針灸有用嗎？」", why: "把對話從「開不開刀」轉向「還有哪些非手術選項」。" },
      { text: "「如果最後要換關節，半人工和全人工各差多少？翻修風險我能接受嗎？」", why: "讓醫師具體說明兩種手術的復原差異和長期風險。" }
    ]
  },
  {
    name: "血糖一直降不下來",
    icon: "💉", iconBg: "#E8F5E9",
    dept: "新陳代謝科 · 營養科",
    hotQs: ["糖化血色素多少該加藥？","口服藥 vs 胰島素怎麼選？","不想打針有替代嗎？"],
    link: "https://sdm.tpech.gov.tw/xcsdm/cont?xsmsid=0I344395713692901115&sid=0J326584302169758218",
    depts: ["新陳代謝科","內分泌科","營養科"],
    treatments: [
      { name: "加強生活型態（暫不加藥）", risk: "low",
        pro: "無額外副作用，運動可降 HbA1c 0.6%", con: "效果有限，需極高自律性" },
      { name: "調整口服藥物", risk: "med",
        pro: "方便，降糖效果中到強", con: "可能有腸胃副作用，用藥次數複雜" },
      { name: "腸泌素 GLP-1 注射", risk: "low",

// ===== STATE =====
let selectedIdx = -1;

// ===== CAROUSEL =====
const HOT_COUNT = 8; // Only first 8 high-frequency topics in carousel
function renderCarousel() {
  const el = document.getElementById("carousel");
  el.innerHTML = topics.slice(0, HOT_COUNT).map((t, i) => `
    <div class="hot-card${selectedIdx===i?' selected':''}" onclick="selectTopic(${i})" id="hc-${i}">
      <div class="hot-card-top">
        <div class="hot-icon" style="background:${t.iconBg}">${t.icon}</div>
        <div>
          <div class="hot-name">${t.name}</div>
          <div class="hot-dept">${t.dept}</div>
        </div>
      </div>
      <div class="hot-questions">
        ${t.hotQs.map(q => `<div class="hot-q"><span class="hot-q-bullet">•</span>${q}</div>`).join("")}
      </div>
    </div>
  `).join("");

  const dots = document.getElementById("carouselDots");
  dots.innerHTML = topics.slice(0, HOT_COUNT).map((_,i) => `<div class="dot${i===0?' active':''}"></div>`).join("");
  el.addEventListener("scroll", () => {
    const idx = Math.round(el.scrollLeft / 272);
    dots.querySelectorAll(".dot").forEach((d,i) => d.classList.toggle("active", i===idx));
  });
}

function selectTopic(idx) {
  if (selectedIdx === idx) { closeTopic(); return; }
  selectedIdx = idx;
  // Update card styles
  document.querySelectorAll(".hot-card").forEach((c,i) => c.classList.toggle("selected", i===idx));
  renderExpand(topics[idx]);
  // Scroll panel into view
  setTimeout(() => {
    document.getElementById("expandPanel").scrollIntoView({ behavior:"smooth", block:"nearest" });
  }, 100);
}

function closeTopic() {
  selectedIdx = -1;
  document.querySelectorAll(".hot-card").forEach(c => c.classList.remove("selected"));
  document.getElementById("expandPanel").classList.remove("show");
}

function renderExpand(t) {
  const panel = document.getElementById("expandPanel");
  panel.classList.add("show");
  panel.innerHTML = `
    <div class="expand-header">
      <div class="expand-icon" style="background:${t.iconBg}">${t.icon}</div>
      <div class="expand-title">${t.name}</div>
      <button class="expand-close" onclick="closeTopic()">✕</button>
    </div>
    <div class="expand-body">
      <div class="dept-row">
        ${t.depts.map(d => `<span class="dtag dept">${d}</span>`).join("")}
      </div>

      <div class="treat-section-title">⚖️ 治療方式比較</div>
      <div class="treat-grid">
        ${t.treatments.map((tr, ti) => `
          <div class="treat-card ${optColors[ti % 4]}">
            <div class="treat-name">
              ${tr.name}
              <span class="label-chip">${tr.risk === 'low' ? '低風險' : tr.risk === 'med' ? '中風險' : '高風險'}</span>
            </div>
            <div class="treat-detail">
              <div class="treat-col pro">
                <div class="treat-col-title">優點</div>
                ✓ ${tr.pro}
              </div>
              <div class="treat-col con">
                <div class="treat-col-title">風險/缺點</div>
                ✗ ${tr.con}
              </div>
            </div>
          </div>
        `).join("")}
      </div>

      <div class="alt-section">
        <strong>🌿 非手術／替代療法：</strong>${t.alts}
      </div>

      <div class="qa-section-header">
        <div class="qa-section-icon">✂️</div>
        <div>
          <div class="qa-section-title">帶去診間照著問（${t.questions.length} 題）</div>
          <div class="qa-section-sub">截圖或存起來，看診時直接照著問</div>
        </div>
      </div>
      <div class="qa-list open">
        ${t.questions.map((q, qi) => `
          <div class="qa-item">
            <div class="qa-num">${qi+1}</div>
            <div class="qa-text">${q.text}</div>
            <div class="qa-purpose"><strong>提問目的：</strong>${q.why}</div>
          </div>
        `).join("")}
      </div>

      ${t.link ? '<a class="pda-link" href="'+t.link+'" target="_blank" rel="noopener">📄 查看官方完整決策輔助表 →</a>' : ''}
    </div>
  `;
}

function toggleQA(el) {
  el.classList.toggle("open");
  el.nextElementSibling.classList.toggle("open");
}

// ===== SEARCH =====
let searchTimer;
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input", function(e) {
  clearTimeout(searchTimer);
  const val = e.target.value.trim();
  document.getElementById("searchClear").classList.toggle("show", val.length > 0);
  searchTimer = setTimeout(() => doSearch(val), 200);
});

function clearSearch() {
  searchInput.value = "";
  document.getElementById("searchClear").classList.remove("show");
  doSearch("");
}

function doSearch(query) {
  const landing = document.getElementById("landing");
  const results = document.getElementById("searchResults");
  const empty = document.getElementById("emptyState");
  if (!query) { landing.classList.remove("hide"); results.classList.remove("show"); empty.classList.remove("show"); return; }
  landing.classList.add("hide");
  const terms = query.toLowerCase().split(/\s+/);
  const matched = allPdas.filter(p => {
    const hay = (p.title + " " + p.kw + " " + p.cat).toLowerCase();
    return terms.some(t => hay.includes(t));
  });
  if (!matched.length) { results.classList.remove("show"); empty.classList.add("show"); return; }
  empty.classList.remove("show");
  results.classList.add("show");
  let html = `<div class="sr-header">找到 ${matched.length} 筆結果</div>`;
  matched.forEach(p => {
    const hl = hlText(p.title, terms);
    const hasDetail = p.topicIdx !== undefined;
    html += `<div class="sr-card">
      <a class="sr-link" href="${hasDetail ? 'javascript:void(0)' : p.link}" ${hasDetail ? `onclick="openSearchTopic(${p.topicIdx})"` : 'target="_blank" rel="noopener"'}>
        <div class="sr-badge" style="background:${p.bg}">${p.icon}</div>
        <div class="sr-info">
          <div class="sr-title">${hl}</div>
          <div class="sr-cat">${p.cat}${hasDetail ? ' · 有完整小抄' : ''}</div>
        </div>
        <span class="sr-arrow">${hasDetail ? '▼' : '→'}</span>
      </a>
    </div>`;
  });
  results.innerHTML = html;
}

function openSearchTopic(idx) {
  clearSearch();
  selectedIdx = idx;
  document.querySelectorAll(".hot-card").forEach((c,i) => c.classList.toggle("selected", i===idx));
  // Scroll carousel to the card
  const card = document.getElementById(`hc-${idx}`);
  if (card) card.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
  renderExpand(topics[idx]);
  setTimeout(() => {
    document.getElementById("expandPanel").scrollIntoView({ behavior:"smooth", block:"start" });
  }, 200);
}

function hlText(text, terms) {
  let r = text;
  terms.forEach(t => { if(t) r = r.replace(new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>'); });
  return r;
}

window.addEventListener("scroll", () => {
  document.getElementById("scrollTop").classList.toggle("show", window.scrollY > 400);
});

// Quick search from hot tags
function quickSearch(term) {
  const input = document.getElementById("searchInput");
  input.value = term;
  document.getElementById("searchClear").classList.add("show");
  doSearch(term);
  input.scrollIntoView({ behavior:"smooth", block:"start" });
}

// Category filter
function filterCat(cat, btn) {
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (cat === 'all') {
    quickSearch('');
    document.getElementById("searchInput").value = '';
    document.getElementById("searchClear").classList.remove("show");
    document.getElementById("landing").classList.remove("hide");
    document.getElementById("searchResults").classList.remove("show");
    document.getElementById("emptyState").classList.remove("show");
    return;
  }
  // Map category button labels to search terms
  const catMap = {
    '心臟': '心臟 心房 心絞 心血管 高血壓 血壓',
    '骨科': '骨科 膝蓋 脊椎 關節 骨折 骨質',
    '糖尿病': '糖尿病 血糖 胰島素',
    '癌症': '癌 腫瘤 乳癌 肺癌 大腸癌',
    '腎臟': '腎臟 洗腎 透析',
    '眼科': '眼 白內障 青光眼 視網膜',
    '精神': '精神 憂鬱 焦慮 失眠 思覺',
    '婦產': '婦 產 子宮 卵巢 分娩',
    '皮膚': '皮膚 濕疹 皮膚炎',
    '腸胃': '胃食道逆流 腸胃 消化 胃酸 火燒心'
  };
  const terms = catMap[cat] || cat;
  const input = document.getElementById("searchInput");
  input.value = cat;
  document.getElementById("searchClear").classList.add("show");
  // Custom multi-term search
  const landing = document.getElementById("landing");
  const results = document.getElementById("searchResults");
  const empty = document.getElementById("emptyState");
  landing.classList.add("hide");
  const searchTerms = terms.toLowerCase().split(/\s+/);
  const matched = allPdas.filter(p => {
    const hay = (p.title + " " + p.kw + " " + p.cat).toLowerCase();
    return searchTerms.some(t => hay.includes(t));
  });
  if (!matched.length) { results.classList.remove("show"); empty.classList.add("show"); return; }
  empty.classList.remove("show");
  results.classList.add("show");
  let html = '<div class="sr-header">找到 ' + matched.length + ' 筆「' + cat + '」相關結果</div>';
  matched.forEach(function(p) {
    const hasDetail = p.topicIdx !== undefined;
    html += '<div class="sr-card"><a class="sr-link" href="' + (hasDetail ? 'javascript:void(0)' : p.link) + '"' + (hasDetail ? ' onclick="openSearchTopic(' + p.topicIdx + ')"' : ' target="_blank" rel="noopener"') + '><div class="sr-badge" style="background:' + p.bg + '">' + p.icon + '</div><div class="sr-info"><div class="sr-title">' + p.title + '</div><div class="sr-cat">' + p.cat + (hasDetail ? ' · 有完整小抄' : '') + '</div></div><span class="sr-arrow">' + (hasDetail ? '▼' : '→') + '</span></a></div>';
  });
  results.innerHTML = html;
}

// INIT
renderCarousel();
</script>
